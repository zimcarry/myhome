<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 마이홈</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f9f9;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: white;
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2b7a78;
        }
        p {
            color: #3aafa9;
            line-height: 1.6;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="container">
       
        <h1>환영합니다! 제 마이홈에 오신 것을 환영해요</h1>
        
        <p>안녕하세요! 이곳은 저의 취향과 일상을 기록하는 아늑한 공간입니다.</p>
        <p>앞으로 이곳에 다양한 이야기들을 채워나갈 예정이니 자주 놀러와 주세요!</p>
    </div>

</body>
</html>
